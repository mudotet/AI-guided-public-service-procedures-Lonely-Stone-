services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: birthguide
      POSTGRES_USER: birthguide
      POSTGRES_PASSWORD: birthguide
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birthguide -d birthguide"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

