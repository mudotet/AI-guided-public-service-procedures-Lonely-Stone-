services:
  - type: web
    name: civicpath-ai-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # ponytail: startup migration is safe for one free instance; use preDeployCommand before scaling.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: NEO_CONNECTION
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ASSISTANT_MODEL
        value: gpt-4.1-mini
      - key: ADMIN_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
